<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市集擺攤陳列模擬器</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧱</text></svg>">
<style>
  :root {
    --bg: #e7ece3;
    --panel: #f5f7f2;
    --ink: #39423a;
    --muted: #7d8a7c;
    --line: #d3dccd;
    --accent: #7f9b78;
    --accent-soft: #dfe8da;
    --danger: #b05d54;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    flex: none;
  }
  header h1 { font-size: 17px; margin: 0; letter-spacing: 1px; }
  header .hint { font-size: 12px; color: var(--muted); }
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  /* ---- sidebar ---- */
  #sidebar {
    width: 250px;
    flex: none;
    background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 14px;
  }
  #sidebar h2 {
    font-size: 13px;
    margin: 4px 0 8px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 1px;
  }
  #sidebar section { margin-bottom: 22px; }
  .field-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .field-row label { font-size: 12px; color: var(--muted); width: 34px; flex: none; }
  .field-row input[type=number] {
    width: 100%;
    padding: 5px 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
  }
  .field-row input[type=number]:disabled {
    background: #e8ede2;
    color: var(--muted);
  }
  .field-row input[type=text] {
    width: 100%;
    padding: 5px 6px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
  }
  .param-grid { display: grid; gap: 6px 8px; margin-bottom: 8px; }
  .param-grid.cols3 { grid-template-columns: repeat(3, 1fr); }
  .param-grid.cols2 { grid-template-columns: repeat(2, 1fr); }
  .param-cell { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .param-cell > span { font-size: 11px; color: var(--muted); }
  .param-cell input[type=number] { width: 100%; padding: 5px 6px; border: 1px solid var(--line); border-radius: 6px; font-size: 13px; }
  .param-cell input[type=number]:disabled { background: #e8ede2; color: var(--muted); }
  .param-cell input[type=color] { width: 100%; height: 30px; padding: 2px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
  .param-cell input[type=color]:disabled { opacity: .45; }
  .param-cell .chk { height: 30px; display: flex; align-items: center; }
  button {
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #faf8f4;
    color: var(--ink);
    cursor: pointer;
  }
  button:hover { background: var(--accent-soft); border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { filter: brightness(1.06); }
  button:disabled { opacity: .4; cursor: default; pointer-events: none; }
  .lib-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px dashed var(--line);
  }
  .lib-item .chip {
    width: 16px; height: 16px; border-radius: 4px; flex: none;
    border: 1px solid rgba(0,0,0,.15);
  }
  .lib-item .meta { flex: 1; min-width: 0; }
  .lib-item .meta .name { font-size: 13px; }
  .lib-item .meta .dims { font-size: 11px; color: var(--muted); }
  .lib-item .del, .lib-item .edit {
    border: none; background: none; color: var(--muted);
    font-size: 14px; padding: 2px 4px;
  }
  .lib-item .del:hover { color: var(--danger); background: none; }
  .lib-item .edit:hover { color: var(--accent); background: none; }
  .lib-item.editing { background: var(--accent-soft); border-radius: 6px; }
  #newItemForm { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
  #newItemForm .dims-row { display: flex; gap: 4px; }
  #newItemForm .dims-row input { width: 100%; }
  #newItemForm input[type=color] {
    width: 100%; height: 30px; padding: 2px; border: 1px solid var(--line);
    border-radius: 6px; background: #fff;
  }
  .stats { font-size: 12px; color: var(--muted); line-height: 1.7; }
  .stats b { color: var(--ink); }
  .stats .warn { color: var(--danger); font-weight: 600; }
  /* ---- workspace ---- */
  #workspace {
    flex: 1;
    display: flex;
    min-width: 0;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .splitter {
    flex: none;
    width: 6px;
    background: var(--line);
    cursor: col-resize;
    touch-action: none;
  }
  .splitter:hover, .splitter.dragging { background: var(--accent); }
  .pane .pane-head {
    flex: none;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--muted);
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .pane .pane-head .title { font-weight: 600; letter-spacing: 1px; }
  .pane .pane-body { flex: 1; min-height: 0; position: relative; }
  #canvas3dWrap { width: 100%; height: 100%; touch-action: none; }
  #canvas3dWrap canvas { display: block; }
  /* ---- 選取物件的尺寸編輯小卡片（浮在 3D 視口上方） ---- */
  #dimCard {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: flex;
    gap: 6px;
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 2px 10px rgba(0,0,0,.12);
  }
  #dimCard[hidden] { display: none; }
  .dim-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 4px 6px 2px;
    border-top: 3px solid transparent;
    border-radius: 4px;
    touch-action: none;
  }
  .dim-cell > span { font-size: 11px; color: var(--muted); }
  .dim-cell input[type=number] {
    width: 64px;
    padding: 4px 5px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    text-align: center;
  }
  #toolbar3d { margin-left: auto; display: flex; gap: 6px; }
  select {
    font-family: inherit; font-size: 12px; padding: 4px 6px;
    border: 1px solid var(--line); border-radius: 6px; background: #fff;
  }
  .kbd-hint { font-size: 11px; color: var(--muted); }
  /* ---- mobile drawer (hidden on desktop) ---- */
  #menuBtn {
    display: none;
    position: fixed; left: 12px; bottom: 12px; z-index: 31;
    width: 48px; height: 48px; border-radius: 50%;
    align-items: center; justify-content: center;
    font-size: 20px; line-height: 1;
    background: var(--accent); color: #fff; border: none;
    box-shadow: 0 2px 10px rgba(0,0,0,.3);
  }
  #drawerBackdrop {
    display: none;
    position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 29;
  }
  @media (max-width: 768px) {
    header .hint { display: none; }
    header h1 { font-size: 14px; }
    #splitA { display: none; }
    .kbd-hint { display: none; }
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 85vw; max-width: 320px; z-index: 30;
      transform: translateX(-100%);
      transition: transform .25s ease;
      box-shadow: 2px 0 14px rgba(0,0,0,.3);
    }
    #sidebar.open { transform: translateX(0); }
    #menuBtn { display: flex; }
    #dimCard { gap: 4px; padding: 6px 8px; }
    .dim-cell input[type=number] { width: 52px; }
  }
</style>
</head>
<body>
<header>
  <h1>🧱 市集擺攤陳列模擬器</h1>
  <span class="hint">左側建立物件 → 加入桌面 → 直接在 3D 視口擺放：左鍵＝選取／拖曳物件，右鍵＝旋轉視角，中鍵＝平移，滾輪＝縮放</span>
</header>
<main>
  <div id="sidebar">
    <section>
      <h2>桌子</h2>
      <div class="param-grid cols3">
        <label class="param-cell"><span>寬 cm</span><input type="number" id="tableW" min="20" max="600" step="1"></label>
        <label class="param-cell"><span>深 cm</span><input type="number" id="tableD" min="20" max="300" step="1"></label>
        <label class="param-cell"><span>高 cm</span><input type="number" id="tableH" min="20" max="150" step="1"></label>
        <label class="param-cell"><span>桌布</span><span class="chk"><input type="checkbox" id="scClothOn"></span></label>
        <label class="param-cell"><span>下擺 cm</span><input type="number" id="scDrop" min="0" step="1" title="桌布下擺長度（cm）"></label>
        <label class="param-cell"><span>桌布顏色</span><input type="color" id="scCloth"></label>
      </div>
      <button class="primary" id="applyTable" style="width:100%">套用桌子尺寸</button>
    </section>
    <section>
      <h2>場景</h2>
      <div class="param-grid cols2">
        <label class="param-cell"><span>背景顏色</span><input type="color" id="scBg"></label>
        <label class="param-cell"><span>地板顏色</span><input type="color" id="scGround"></label>
        <label class="param-cell"><span>人偶</span><span class="chk"><input type="checkbox" id="scFigOn"></span></label>
        <label class="param-cell"><span>身高 cm</span><input type="number" id="scFigH" min="100" max="210" step="1" title="身高（cm）"></label>
      </div>
    </section>
    <section>
      <h2>物件庫</h2>
      <div id="libList"></div>
      <div id="newItemForm">
        <div class="field-row"><label>名稱</label><input type="text" id="niName" placeholder="例：明信片架"></div>
        <div class="field-row"><label>寬高深</label>
          <div class="dims-row">
            <input type="number" id="niW" placeholder="寬" min="1">
            <input type="number" id="niH" placeholder="高" min="1">
            <input type="number" id="niD" placeholder="深" min="1">
          </div>
        </div>
        <div class="field-row"><label>形狀</label>
          <select id="niShape" style="width:100%">
            <option value="box">方塊</option>
            <option value="steps">階梯展示架</option>
            <option value="pegboard">洞洞板</option>
          </select>
        </div>
        <div class="field-row" id="niTiersRow" style="display:none">
          <label>層數</label><input type="number" id="niTiers" value="3" min="2" max="8" step="1">
        </div>
        <div class="field-row"><label>顏色</label><input type="color" id="niColor" value="#8ba28a"></div>
        <div style="display:flex; gap:6px;">
          <button id="addLibItem" style="flex:1">＋ 新增到物件庫</button>
          <button id="cancelEdit" style="display:none">取消</button>
        </div>
      </div>
    </section>
    <section>
      <h2>統計</h2>
      <div class="stats" id="stats"></div>
    </section>
    <section>
      <button id="clearTable" style="width:100%">清空桌面</button>
    </section>
  </div>

  <div class="splitter" id="splitA"></div>
  <div id="workspace">
    <div class="pane" id="pane3d">
      <div class="pane-head">
        <span class="title">3D 編輯視口</span>
        <button id="btnViewTop">俯視</button>
        <button id="btnViewFront">前視</button>
        <span class="kbd-hint">左鍵＝選取／拖曳物件，右鍵＝旋轉視角，中鍵＝平移，滾輪＝縮放</span>
        <div id="toolbar3d">
          <button id="btnRot" disabled>旋轉（R）</button>
          <button id="btnDup" disabled>複製（D）</button>
          <button id="btnDel" disabled>刪除（Del）</button>
        </div>
      </div>
      <div class="pane-body">
        <div id="dimCard" hidden>
          <label class="dim-cell" data-dim="w"><span>寬</span><input type="number" step="0.5" min="0.5" inputmode="decimal"></label>
          <label class="dim-cell" data-dim="h"><span>高</span><input type="number" step="0.5" min="0.5" inputmode="decimal"></label>
          <label class="dim-cell" data-dim="d"><span>深</span><input type="number" step="0.5" min="0.5" inputmode="decimal"></label>
        </div>
        <div id="canvas3dWrap"></div>
      </div>
    </div>
  </div>
</main>

<button id="menuBtn" title="開啟選單">☰</button>
<div id="drawerBackdrop"></div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from './vendor/OrbitControls.js';

/* ================= state ================= */
const STORAGE_KEY = 'market-display-v1';

const DEFAULT_STATE = {
  table: { w: 180, d: 60, h: 75 },
  library: [
    { id: 1, name: '明信片架', w: 20, d: 15, h: 30, color: '#ab8b7c' },
    { id: 2, name: 'A5 立牌',  w: 15, d: 8,  h: 21, color: '#8ba28a' },
    { id: 3, name: '貼紙收納盒', w: 25, d: 18, h: 6, color: '#7f93a3' },
    { id: 4, name: '陳列木箱', w: 30, d: 20, h: 15, color: '#a39a80' },
    { id: 5, name: '名片座',  w: 10, d: 6,  h: 5,  color: '#9a8ca3' },
    { id: 6, name: '階梯展示架', w: 40, d: 30, h: 24, color: '#8f9377', shape: 'steps', tiers: 3 },
    { id: 7, name: '洞洞板',   w: 60, d: 2, h: 60, color: '#c5c9ad', shape: 'pegboard' },
  ],
  placed: [],   // { id, itemId, cx, cy, rot }  cx/cy = 中心點（cm），rot = 任意角度（度，0–360，浮點數）
  nextId: 100,
  scene: { bg: '#e2e8dc', groundColor: '#c6d1bd', clothColor: '#eef1e6', clothOn: true, clothDrop: 20, figureOn: false, figureH: 165, figureX: null, figureY: null },
};

let state = loadState();
let selectedId = null;
let editingItemId = null; // 目前正在編輯的物件庫項目 id（null = 新增模式）

function loadState() {
  let s = null;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) s = JSON.parse(raw);
  } catch (e) { /* 壞資料直接重來 */ }
  if (!s) return structuredClone(DEFAULT_STATE);
  // 舊存檔沒有場景設定（背景／桌布／人偶）時補上預設值
  if (!s.scene) s.scene = structuredClone(DEFAULT_STATE.scene);
  // 舊存檔沒有地板顏色時，沿用舊版「地面比背景略深」的推導結果，保持使用者目前看到的地板色不變
  if (!s.scene.groundColor) s.scene.groundColor = '#' + shade(s.scene.bg, 0.85).getHexString();
  // 舊存檔沒有桌布開關時，預設為開（維持原本一定有桌布的行為）
  if (s.scene.clothOn === undefined) s.scene.clothOn = true;
  // 舊存檔沒有人偶位置欄位時補 null（null 代表沿用預設位置）
  if (s.scene.figureX === undefined) s.scene.figureX = null;
  if (s.scene.figureY === undefined) s.scene.figureY = null;
  // 舊存檔沒有的新預設道具（階梯、洞洞板）補進物件庫
  for (const def of DEFAULT_STATE.library) {
    if (def.shape && !s.library.some(i => i.shape === def.shape)) {
      s.library.push({ ...def, id: s.nextId++ });
    }
  }
  // 舊版洞洞板（含支撐腳、深 20）改為只有板身
  for (const i of s.library) {
    if (i.shape === 'pegboard' && i.w === 60 && i.d === 20 && i.h === 60) i.d = 2;
  }
  // 舊版「擺放實例縮放係數」欄位（scale）改為直接覆寫 w/d/h（0.5cm 級距），找不到對應物件庫項目就直接捨棄
  for (const p of s.placed) {
    if (p.scale === undefined) continue;
    const it = s.library.find(i => i.id === p.itemId);
    if (it) {
      p.w = Math.round(it.w * p.scale * 2) / 2;
      p.d = Math.round(it.d * p.scale * 2) / 2;
      p.h = Math.round(it.h * p.scale * 2) / 2;
    }
    delete p.scale;
  }
  // 舊預設配色換成莫蘭迪綠色系（使用者自選的顏色不受影響）
  const RECOLOR = {
    '#c96f4a': '#ab8b7c', '#7a9e7e': '#8ba28a', '#5f7fa8': '#7f93a3',
    '#a8845f': '#a39a80', '#8d6fa8': '#9a8ca3', '#9a7b4f': '#8f9377',
    '#d9c7a7': '#c5c9ad',
  };
  for (const i of s.library) if (RECOLOR[i.color]) i.color = RECOLOR[i.color];
  return s;
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function libItem(itemId) { return state.library.find(i => i.id === itemId); }

/* 取擺放實例的有效尺寸（實例覆寫優先，否則用物件庫定義） */
function effItem(p) {
  const it = libItem(p.itemId);
  if (!it) return null;
  return { ...it, w: p.w ?? it.w, d: p.d ?? it.d, h: p.h ?? it.h };
}

/* 人偶目前位置（與物件同座標系：桌面左上角為原點，cm）；figureX/Y 為 null 時使用預設站位（桌前 40cm）；可在 3D 視口直接拖曳 */
function figurePos() {
  return {
    x: state.scene.figureX ?? state.table.w / 2,
    y: state.scene.figureY ?? state.table.d + 40,
  };
}

/* 物件四個角（考慮任意角度旋轉）的世界座標，順序：左上、右上、右下、左下（局部座標系） */
function cornersOf(p) {
  const it = effItem(p);
  const hw = it.w / 2, hd = it.d / 2;
  const th = p.rot * Math.PI / 180;
  const cos = Math.cos(th), sin = Math.sin(th);
  const local = [[-hw, -hd], [hw, -hd], [hw, hd], [-hw, hd]];
  return local.map(([x, y]) => ({
    x: p.cx + x * cos - y * sin,
    y: p.cy + x * sin + y * cos,
  }));
}
/* SAT（分離軸定理）矩形重疊判斷，傳入兩組已旋轉好的世界座標角點 */
function satOverlap(cornersA, cornersB) {
  const EPS = 0.01;
  for (const corners of [cornersA, cornersB]) {
    for (let i = 0; i < 4; i++) {
      const p1 = corners[i], p2 = corners[(i + 1) % 4];
      const ex = p2.x - p1.x, ey = p2.y - p1.y;
      const len = Math.hypot(ex, ey) || 1;
      const ax = -ey / len, ay = ex / len; // 邊的法向量（分離軸）
      let minA = Infinity, maxA = -Infinity, minB = Infinity, maxB = -Infinity;
      for (const pt of cornersA) { const proj = pt.x * ax + pt.y * ay; if (proj < minA) minA = proj; if (proj > maxA) maxA = proj; }
      for (const pt of cornersB) { const proj = pt.x * ax + pt.y * ay; if (proj < minB) minB = proj; if (proj > maxB) maxB = proj; }
      if (maxA <= minB + EPS || maxB <= minA + EPS) return false; // 這條軸上有間隙，兩矩形不重疊
    }
  }
  return true;
}
/* 是否超出桌面：四個角必須都落在 [0,w]x[0,d] 內（留一點 epsilon） */
function outOfBounds(p) {
  const EPS = 0.01;
  return cornersOf(p).some(pt =>
    pt.x < -EPS || pt.y < -EPS || pt.x > state.table.w + EPS || pt.y > state.table.d + EPS);
}
function computeConflicts() {
  // 重疊不再算衝突（改由自動堆疊處理），只回報超出桌面的物件
  const bad = new Set();
  for (const p of state.placed) if (outOfBounds(p)) bad.add(p.id);
  return bad;
}

/* 物件足跡的取樣點（4 角 + 4 邊中點 + 中心，共 9 點），世界座標 */
function sampleFootprintPoints(p, it) {
  const hw = it.w / 2, hd = it.d / 2;
  const local = [
    [-hw, -hd], [hw, -hd], [hw, hd], [-hw, hd],
    [0, -hd], [0, hd], [-hw, 0], [hw, 0],
    [0, 0],
  ];
  const th = p.rot * Math.PI / 180;
  const cos = Math.cos(th), sin = Math.sin(th);
  return local.map(([x, y]) => ({
    x: p.cx + x * cos - y * sin,
    y: p.cy + x * sin + y * cos,
  }));
}
/* 世界座標點在物件 pj（含旋轉）局部座標下的頂面高度；超出 pj 的 w×d 範圍回傳 null */
function supportTop(pj, itj, worldPoint) {
  const dx = worldPoint.x - pj.cx, dy = worldPoint.y - pj.cy;
  const th = -pj.rot * Math.PI / 180; // 逆旋轉，轉回局部座標
  const cos = Math.cos(th), sin = Math.sin(th);
  const lx = dx * cos - dy * sin;
  const ly = dx * sin + dy * cos;
  const EPS = 0.01;
  if (lx < -itj.w / 2 - EPS || lx > itj.w / 2 + EPS || ly < -itj.d / 2 - EPS || ly > itj.d / 2 + EPS) return null;
  if (itj.shape === 'steps') {
    // 階梯：局部 -d 側（後排）最高，跟 3D 繪製方向一致
    const n = itj.tiers || 3;
    const idx = Math.min(n - 1, Math.max(0, Math.floor((ly + itj.d / 2) / (itj.d / n))));
    return itj.h * (n - idx) / n;
  }
  return itj.h; // 一般方塊、洞洞板都是整塊高度
}
/* 依 state.placed 陣列順序（即堆疊優先序）計算每個物件底部離桌面的高度（cm），不落地存檔 */
function computeElevations() {
  const elev = new Map();
  const placed = state.placed;
  for (let i = 0; i < placed.length; i++) {
    const pi = placed[i];
    const iti = effItem(pi);
    if (!iti) { elev.set(pi.id, 0); continue; }
    const ci = cornersOf(pi);
    const samples = sampleFootprintPoints(pi, iti);
    let z = 0;
    for (let j = 0; j < i; j++) {
      const pj = placed[j];
      const itj = effItem(pj);
      if (!itj) continue;
      if (!satOverlap(ci, cornersOf(pj))) continue;
      const zj = elev.get(pj.id) || 0;
      let top = null;
      for (const pt of samples) {
        const h = supportTop(pj, itj, pt);
        if (h != null) top = top == null ? h : Math.max(top, h);
      }
      if (top == null) top = itj.h; // SAT 判定重疊但 9 個取樣點都不在 j 內（小面積邊角交疊），退而用最高層高度
      z = Math.max(z, zj + top);
    }
    elev.set(pi.id, z);
  }
  return elev;
}

/* ================= 尺寸編輯小卡片 ================= */
/* 寬（X）／高（Y）／深（Z）三個方向的統一配色，卡片色條與 3D 標示棒都從這裡取色 */
const DIM_COLORS = { w: '#c0605a', h: '#6a9e64', d: '#5d7fb5' };

const dimCard = document.getElementById('dimCard');
const dimCells = {};
for (const cell of dimCard.querySelectorAll('.dim-cell')) {
  const dim = cell.dataset.dim;
  cell.style.borderTopColor = DIM_COLORS[dim];
  dimCells[dim] = { cell, input: cell.querySelector('input') };
}

/* 把選取物件目前的寬／高／深填入卡片；沒有選取就隱藏卡片；正在打字的欄位不覆寫 */
function syncDimCard() {
  const p = state.placed.find(q => q.id === selectedId);
  const it = p ? effItem(p) : null;
  if (!it) { dimCard.hidden = true; return; }
  dimCard.hidden = false;
  for (const dim of ['w', 'h', 'd']) {
    const { input } = dimCells[dim];
    if (document.activeElement === input) continue;
    input.value = it[dim];
  }
}

/* 把 dim（'w'/'h'/'d'）套用到目前選取物件的擺放實例覆寫欄位（0.5cm 級距，0.5–600cm），不在此處存檔 */
function applyDim(dim, rawValue) {
  const p = state.placed.find(q => q.id === selectedId);
  if (!p) return;
  const v = Math.min(600, Math.max(0.5, Math.round(rawValue * 2) / 2));
  p[dim] = v;
  update();
  return v;
}

for (const dim of ['w', 'h', 'd']) {
  const { cell, input } = dimCells[dim];
  input.addEventListener('input', () => {
    const v = Number(input.value);
    if (input.value.trim() === '' || Number.isNaN(v)) return;
    applyDim(dim, v);
  });
  input.addEventListener('change', () => {
    const v = Number(input.value);
    if (input.value.trim() === '' || Number.isNaN(v)) { syncDimCard(); return; }
    const applied = applyDim(dim, v);
    input.value = applied;
    saveState();
  });

  // 手機：按住欄位上下拖拉調值（0.5cm 級距，往上加、往下減），滑鼠點擊維持正常聚焦行為
  let drag = null;
  cell.addEventListener('pointerdown', (evt) => {
    if (evt.pointerType !== 'touch') return;
    const p = state.placed.find(q => q.id === selectedId);
    const it = p ? effItem(p) : null;
    if (!it) return;
    evt.preventDefault();
    cell.setPointerCapture(evt.pointerId);
    drag = { pointerId: evt.pointerId, startY: evt.clientY, startVal: it[dim], moved: false };
  });
  cell.addEventListener('pointermove', (evt) => {
    if (!drag || evt.pointerId !== drag.pointerId) return;
    const diff = drag.startY - evt.clientY;
    if (Math.abs(diff) > 6) drag.moved = true;
    const steps = Math.round(diff / 8);
    const newVal = Math.min(600, Math.max(0.5, drag.startVal + steps * 0.5));
    if (newVal !== Number(input.value)) {
      const applied = applyDim(dim, newVal);
      input.value = applied;
    }
  });
  const endDrag = (evt) => {
    if (!drag || evt.pointerId !== drag.pointerId) return;
    const wasMoved = drag.moved;
    drag = null;
    if (wasMoved) saveState();
    else input.focus();
  };
  cell.addEventListener('pointerup', endDrag);
  cell.addEventListener('pointercancel', endDrag);
}

/* 加入桌面：從中心往外找一個跟現有「桌面上」物件（z===0）不重疊的位置，rot 固定 0 */
function addToTable(itemId) {
  const snap = 5;
  const cand = { id: state.nextId++, itemId, cx: 0, cy: 0, rot: 0 };
  const elev = computeElevations();
  const groundOthers = state.placed.filter(p => (elev.get(p.id) || 0) < 0.001);
  const cx0 = Math.round(state.table.w / 2 / snap) * snap;
  const cy0 = Math.round(state.table.d / 2 / snap) * snap;
  outer:
  for (let ring = 0; ring < 30; ring++) {
    for (let oy = -ring; oy <= ring; oy++) {
      for (let ox = -ring; ox <= ring; ox++) {
        if (Math.max(Math.abs(ox), Math.abs(oy)) !== ring) continue;
        cand.cx = cx0 + ox * snap;
        cand.cy = cy0 + oy * snap;
        if (outOfBounds(cand)) continue;
        if (!groundOthers.some(o => satOverlap(cornersOf(o), cornersOf(cand)))) break outer;
      }
    }
    if (ring === 29) { cand.cx = cx0; cand.cy = cy0; } // 找不到空位就放桌面中心，會自動疊到最上層
  }
  state.placed.push(cand);
  selectedId = cand.id;
  saveState(); select(cand.id);
}

    const it = state.library.find(i => i.id === editingItemId);

function renderStats(elevations) {

  const used = state.placed.reduce((s, p) => {
    if ((elevations.get(p.id) || 0) > 0.001) return s;
    const it = effItem(p);
    return it ? s + it.w * it.d : s;
  }, 0);
  const pct = area ? Math.round(used / area * 100) : 0;
  const conflicts = computeConflicts();
  document.getElementById('stats').innerHTML = `
    桌面面積：<b>${area.toLocaleString()} cm²</b><br>
    已擺物件：<b>${state.placed.length}</b> 件<br>

    ${conflicts.size ? `<span class="warn">⚠ ${conflicts.size} 件超出桌面</span>` : '✓ 沒有超出桌面'}`;
}

function build3dTable() {
  disposeGroup(tableGroup);
  const { w, d, h } = state.table;
  const topMat = new THREE.MeshStandardMaterial({ color: '#b3af9b', roughness: 0.85, metalness: 0.02 });
  const legMat = new THREE.MeshStandardMaterial({ color: '#7f7d6c', roughness: 0.85, metalness: 0.02 });
  const topThick = 4;
  const top = new THREE.Mesh(new THREE.BoxGeometry(w, topThick, d), topMat);
  top.position.y = h - topThick / 2;
  top.castShadow = true; top.receiveShadow = true;
  tableGroup.add(top);
  const legSize = 5;
  const lx = w / 2 - legSize, lz = d / 2 - legSize;
  for (const [sx, sz] of [[1, 1], [1, -1], [-1, 1], [-1, -1]]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(legSize, h - topThick, legSize), legMat);
    leg.position.set(sx * lx, (h - topThick) / 2, sz * lz);
    leg.castShadow = true; leg.receiveShadow = true;
    tableGroup.add(leg);
  }
  // 桌布：頂布 + 四邊裙擺（下擺長度由 state.scene.clothDrop 決定，不超過桌高；clothOn 關閉時裸桌不建桌布）
  if (state.scene.clothOn === false) return;
  const clothMat = new THREE.MeshStandardMaterial({ color: state.scene.clothColor, roughness: 0.9, metalness: 0.02 });
  const cloth = new THREE.Mesh(new THREE.BoxGeometry(w + 4, 0.5, d + 4), clothMat);
  cloth.position.y = h + 0.25;
  cloth.castShadow = true; cloth.receiveShadow = true;
  tableGroup.add(cloth);
  const drop = Math.min(state.scene.clothDrop, h);
  if (drop > 0) {
    const skirtY = h + 0.5 - drop / 2;
    const front = new THREE.Mesh(new THREE.BoxGeometry(w + 4, drop, 0.5), clothMat);
    front.position.set(0, skirtY, d / 2 + 1.75);
    front.castShadow = true; front.receiveShadow = true;
    tableGroup.add(front);
    const back = new THREE.Mesh(new THREE.BoxGeometry(w + 4, drop, 0.5), clothMat);
    back.position.set(0, skirtY, -(d / 2 + 1.75));
    back.castShadow = true; back.receiveShadow = true;
    tableGroup.add(back);
    const right = new THREE.Mesh(new THREE.BoxGeometry(0.5, drop, d + 4), clothMat);
    right.position.set(w / 2 + 1.75, skirtY, 0);
    right.castShadow = true; right.receiveShadow = true;
    tableGroup.add(right);
    const left = new THREE.Mesh(new THREE.BoxGeometry(0.5, drop, d + 4), clothMat);
    left.position.set(-(w / 2 + 1.75), skirtY, 0);
    left.castShadow = true; left.receiveShadow = true;
    tableGroup.add(left);
  }
}

/* 物件墊高量：桌布開啟時物件墊在桌布頂面（+0.5cm），關閉時直接放在桌板頂面 */
function clothOffsetY() {
  return state.scene.clothOn === false ? 0 : 0.5;
}

function build3dItems(elevations) {
  disposeGroup(itemGroup);
  const conflicts = computeConflicts();
  const { w, d, h } = state.table;
  for (const p of state.placed) {
    const it = effItem(p);
    if (!it) continue;
    const g = buildItemGroup(it, conflicts.has(p.id));
    g.userData.placedId = p.id; // 供 raycast 命中後反查是哪個擺放物
    if (p.id === selectedId) {
      g.traverse(o => { if (o.isMesh) o.material.emissive = new THREE.Color('#3f4d3a'); });
    }
    const z = elevations.get(p.id) || 0;
    // 平面座標 (cx, cy) 對應 3D 的 (x, z)；cx/cy 原點在桌面左上角，3D 桌面中心在原點；z 為堆疊高度
    g.position.set(p.cx - w / 2, h + clothOffsetY() + z, p.cy - d / 2);
    g.rotation.y = -p.rot * Math.PI / 180;
    itemGroup.add(g);
  }
}

/* 素描木人偶（artist mannequin），比例依 state.scene.figureH 換算，位置依 figurePos()（可在 2D 圖拖曳，預設站在桌前 40cm） */
function buildFigure() {
  disposeGroup(figureGroup);
  const { w, d } = state.table;
  const p = figurePos();
  figureGroup.position.set(p.x - w / 2, 0, p.y - d / 2);
  if (!state.scene.figureOn) return;
  const H = state.scene.figureH;
  const bodyMat = new THREE.MeshStandardMaterial({ color: '#d8d5cf', roughness: 0.7, metalness: 0.02 });
  const jointMat = new THREE.MeshStandardMaterial({ color: '#c2beb6', roughness: 0.7, metalness: 0.02 });

  // 四肢圓柱：靠近軀幹端（rTrunkEnd）較粗，遠端（rFarEnd）較細；yFar/yTrunk 為兩端關節球中心高度
  function limb(rTrunkEnd, rFarEnd, yFar, yTrunk, x) {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(rTrunkEnd, rFarEnd, yTrunk - yFar, 10), bodyMat);
    m.position.set(x, (yTrunk + yFar) / 2, 0);
    figureGroup.add(m);
  }
  // 關節球
  function ball(r, y, x = 0, z = 0) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), jointMat);
    m.position.set(x, y, z);
    figureGroup.add(m);
  }
  // 胸腔／骨盆用的壓扁塊體（rTop/rBottom 決定上下寬窄，scale.z 壓成橢圓斷面）
  function torsoBlock(rTop, rBottom, yBottom, yTop) {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(rTop, rBottom, yTop - yBottom, 16), bodyMat);
    m.scale.z = 0.6;
    m.position.y = (yTop + yBottom) / 2;
    figureGroup.add(m);
  }

  // ---- 腿部（胯部高約 H*0.5，雙腿微開站立） ----
  const hipY = H * 0.5;
  const kneeY = H * 0.26;
  const ankleY = H * 0.045;
  const hipHalfW = H * 0.10;
  for (const sx of [1, -1]) {
    const x = sx * hipHalfW;
    // 腳：前後拉長、壓扁的橢圓，往桌子方向（-z）伸出
    const foot = new THREE.Mesh(new THREE.SphereGeometry(H * 0.045, 12, 10), bodyMat);
    foot.scale.set(0.8, 0.4, 1.7);
    foot.position.set(x, H * 0.018, -H * 0.045);
    figureGroup.add(foot);
    ball(H * 0.018, ankleY, x);                       // 踝關節
    limb(H * 0.019, H * 0.014, ankleY, kneeY, x);      // 小腿（膝端較粗）
    ball(H * 0.02, kneeY, x);                          // 膝關節
    limb(H * 0.026, H * 0.02, kneeY, hipY, x);         // 大腿（髖端較粗）
    ball(H * 0.026, hipY, x);                          // 髖關節
  }

  // ---- 骨盆（上窄下寬） ----
  const pelvisTopY = hipY + H * 0.09;
  torsoBlock(H * 0.065, H * 0.10, hipY, pelvisTopY);
  ball(H * 0.028, pelvisTopY);                          // 腰關節

  // ---- 頭（蛋形：sphere 拉長 scale.y） ----
  const headLen = H / 7;
  const headR = headLen / 2.6;
  const headBottomY = H - headLen;
  const head = new THREE.Mesh(new THREE.SphereGeometry(headR, 16, 12), bodyMat);
  head.scale.y = 1.3;
  head.position.y = headBottomY + 1.3 * headR;
  figureGroup.add(head);

  // ---- 胸腔（上寬下窄） ----
  const torsoTopY = headBottomY; // 與頸關節／頭部底端銜接
  torsoBlock(H * 0.115, H * 0.075, pelvisTopY, torsoTopY);
  ball(headR * 0.45, headBottomY);                      // 頸關節

  // ---- 手臂（肩寬約 H*0.24，自然下垂身體兩側） ----
  const shoulderHalfW = H * 0.12;
  const shoulderY = torsoTopY;
  const elbowY = shoulderY - H * 0.19;
  const wristY = elbowY - H * 0.16;
  for (const sx of [1, -1]) {
    const x = sx * shoulderHalfW;
    ball(H * 0.03, shoulderY, x);                       // 肩關節
    limb(H * 0.026, H * 0.019, elbowY, shoulderY, x);   // 上臂（肩端較粗）
    ball(H * 0.02, elbowY, x);                          // 肘關節
    limb(H * 0.018, H * 0.012, wristY, elbowY, x);      // 前臂（肘端較粗）
    ball(H * 0.014, wristY, x);                         // 腕關節
    // 手：小的扁橢圓
    const hand = new THREE.Mesh(new THREE.SphereGeometry(H * 0.045, 10, 8), jointMat);
    hand.scale.set(0.6, 0.85, 0.35);
    hand.position.set(x, wristY - H * 0.045, 0);
    figureGroup.add(hand);
  }
  figureGroup.traverse(o => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
}

/* 依形狀組出 3D 模型（局部座標：原點在物件中心的桌面高度） */
function buildItemGroup(it, bad) {
  const g = new THREE.Group();
  const color = bad ? '#b05d54' : it.color;
  const addBox = (bw, bh, bd, x, y, z, mat) => {
    const box = new THREE.Mesh(
      new THREE.BoxGeometry(bw, bh, bd),
      mat || new THREE.MeshStandardMaterial({ color, roughness: 0.85, metalness: 0.02 })
    );
    box.position.set(x, y, z);
    box.castShadow = true;
    box.receiveShadow = true;
    g.add(box);
    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(box.geometry),
      new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.25 })
    );
    edges.position.copy(box.position);
    g.add(edges);
  };
  if (it.shape === 'steps') {
    // 階梯：局部 -z 側（後排）最高
    const n = it.tiers || 3;
    for (let j = 0; j < n; j++) {
      const stepH = it.h * (n - j) / n;
      const z = -it.d / 2 + (j + 0.5) * it.d / n;
      addBox(it.w, stepH, it.d / n, 0, stepH / 2, z);
    }
  } else if (it.shape === 'pegboard') {
    // 只有板身，佔位深度＝板厚
    const mat = new THREE.MeshStandardMaterial({ color, map: bad ? null : pegboardTexture(), roughness: 0.85, metalness: 0.02 });
    addBox(it.w, it.h, it.d, 0, it.h / 2, 0, mat);
  } else {
    addBox(it.w, it.h, it.d, 0, it.h / 2, 0);
  }
  return g;
}

/* 洞洞板的洞點花紋（共用一份，不隨物件銷毀） */
let pegTexCache = null;
function pegboardTexture() {
  if (pegTexCache) return pegTexCache;
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 256, 256);
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  const step = 24;
  for (let y = step / 2; y < 256; y += step)
    for (let x = step / 2; x < 256; x += step) {
      ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
    }
  pegTexCache = new THREE.CanvasTexture(c);
  return pegTexCache;
}

function disposeGroup(g) {
  g.traverse(o => {
    if (o.isMesh || o.isLine || o.isLineSegments) {
      o.geometry?.dispose();
      (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
    }
  });
  g.clear();
}

/* --- 選取物件的旋轉把手（移植自 2D 版：中心往局部 -z 伸出虛線，末端小球可拖曳旋轉） --- */
let rotHandleInfo = null; // { id, y }：把手對應的擺放物 id 與把手所在水平面高度（世界座標）
function buildRotHandle(elevations) {
  disposeGroup(handleGroup);
  rotHandleInfo = null;
  const p = state.placed.find(q => q.id === selectedId);
  const it = p ? effItem(p) : null;
  if (!p || !it) return;
  const { w, d, h } = state.table;
  // 把手放在物件底面略上方（+1cm），rot=0 時指向局部 -z（顧客側的反方向，即桌子後側）
  const y = h + clothOffsetY() + (elevations.get(p.id) || 0) + 1;
  handleGroup.position.set(p.cx - w / 2, y, p.cy - d / 2);
  handleGroup.rotation.y = -p.rot * Math.PI / 180;
  const len = it.d / 2 + 6; // 距物件中心的距離（同 2D 版：d/2 + 6cm）
  // 虛線：物件中心 → 把手
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, -len),
  ]);
  // 把手屬於編輯 gizmo，關閉深度測試讓它永遠畫在最上層，不被物件本身擋住
  const line = new THREE.Line(lineGeo, new THREE.LineDashedMaterial({ color: 0x39423a, dashSize: 1.5, gapSize: 1.2, depthTest: false }));
  line.computeLineDistances();
  line.renderOrder = 10;
  handleGroup.add(line);
  // 小球本體
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(2.5, 16, 12),
    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x39423a, emissiveIntensity: 0.2, depthTest: false })
  );
  ball.position.set(0, 0, -len);
  ball.renderOrder = 11;
  handleGroup.add(ball);
  // 較大的透明命中球，讓滑鼠／手指好點一點（raycast 仍會命中透明材質）
  const hit = new THREE.Mesh(
    new THREE.SphereGeometry(5, 8, 6),
    new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false })
  );
  hit.position.set(0, 0, -len);
  handleGroup.add(hit);
  rotHandleInfo = { id: p.id, y };
}

/* --- 選取物件的寬／高／深彩色標示棒（顏色與尺寸卡片同源：DIM_COLORS） --- */
function buildDimIndicator(elevations) {
  disposeGroup(dimGroup);
  const p = state.placed.find(q => q.id === selectedId);
  const it = p ? effItem(p) : null;
  if (!p || !it) return;
  const { w, d, h } = state.table; // 桌子尺寸（用來把物件局部座標換算到場景座標，注意跟下方 it.w/it.h/it.d 區分）
  const elev = elevations.get(p.id) || 0;
  dimGroup.position.set(p.cx - w / 2, h + clothOffsetY() + elev, p.cy - d / 2);
  dimGroup.rotation.y = -p.rot * Math.PI / 180;

  const THICK = 0.8; // 標示棒粗細（cm）
  const bar = (dim, geo, pos) => {
    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: DIM_COLORS[dim], depthTest: false }));
    mesh.position.set(pos[0], pos[1], pos[2]);
    mesh.renderOrder = 12;
    dimGroup.add(mesh);
  };
  // 寬（X／紅）：沿底部靠前緣
  bar('w', new THREE.BoxGeometry(it.w, THICK, THICK), [0, 0.4, it.d / 2 + 1]);
  // 深（Z／藍）：沿底部靠右緣
  bar('d', new THREE.BoxGeometry(THICK, THICK, it.d), [it.w / 2 + 1, 0.4, 0]);
  // 高（Y／綠）：右前直立邊
  bar('h', new THREE.BoxGeometry(THICK, it.h, THICK), [it.w / 2 + 1, it.h / 2, it.d / 2 + 1]);
}

/* --- 軌道視角（OrbitControls：右鍵旋轉、中鍵平移、滾輪縮放，含慣性阻尼；左鍵留給物件互動） --- */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.mouseButtons = { LEFT: -1, MIDDLE: THREE.MOUSE.PAN, RIGHT: THREE.MOUSE.ROTATE };
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 60;
controls.maxDistance = 1500;

function rebuild3dCamera() {
  const { w, d, h } = state.table;
  const dist = Math.max(w, d) * 1.6 + 80;
  controls.target.set(0, h * 0.9, 0);
  camera.position.set(dist * 0.55, dist * 0.7, dist * 0.55);
  controls.update();
}
/* 視角預設：俯視（桌面正上方往下看整張桌子） */
function viewTop() {
  const { w, d, h } = state.table;
  controls.target.set(0, h, 0);
  camera.position.set(0, h + Math.max(w, d) * 1.4 + 60, 0.01);
  controls.update();
}
/* 視角預設：前視（從桌子前方＝顧客側水平偏上一點看向桌面） */
function viewFront() {
  const { w, d, h } = state.table;
  controls.target.set(0, h * 0.9, 0);
  camera.position.set(0, h * 1.2, Math.max(w, d) * 1.4 + 60);
  controls.update();
}
document.getElementById('btnViewTop').addEventListener('click', viewTop);
document.getElementById('btnViewFront').addEventListener('click', viewFront);

/* ================= 3D 視口互動 =================
   左鍵＝選取／拖曳物件（含旋轉把手、人偶），右鍵＝旋轉視角（OrbitControls），中鍵＝平移，滾輪＝縮放；
   觸控：單指按物件＝拖曳、按空白＝旋轉視角（OrbitControls 接手）、雙指＝縮放／平移（OrbitControls） */
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();
/* 依滑鼠事件位置設定 raycaster 的射線 */
function setRayFromEvent(evt) {
  const rect = renderer.domElement.getBoundingClientRect();
  ndc.set(
    ((evt.clientX - rect.left) / rect.width) * 2 - 1,
    -((evt.clientY - rect.top) / rect.height) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
}
/* 目前射線與水平面 y=planeY 的交點（世界座標），沒交到回傳 null */
function rayHitPlaneY(planeY) {
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -planeY);
  const out = new THREE.Vector3();
  return raycaster.ray.intersectPlane(plane, out) ? out : null;
}
/* 從 raycast 交到的 Object3D 往 parent 走，找出存有擺放物 id 的 group */
function findPlacedId(obj) {
  let o = obj;
  while (o && o !== itemGroup) {
    if (o.userData.placedId != null) return o.userData.placedId;
    o = o.parent;
  }
  return null;
}

let drag3d = null; // 物件互動中：{ mode: 'item' | 'figure' | 'handle', pointerId, ... }
/* 觸控在空白處按下時的起點：{ pointerId, x, y, moved }，供 pointerup 判斷是否為「點一下」（未移動）以取消選取；
   有移動則代表 OrbitControls 正在接手旋轉視角，不處理 */
let blankTouchStart = null;

/* 左鍵（或觸控單指）按下：依 raycast 結果進入對應模式，優先序：旋轉把手 > 人偶 > 物件 > 空白；回傳是否命中互動物件 */
function beginPrimary(evt) {
  const isTouch = evt.pointerType === 'touch';
  const { w, d, h } = state.table;
  setRayFromEvent(evt);
  // 1) 旋轉把手（優先於一般物件）
  if (rotHandleInfo && raycaster.intersectObject(handleGroup, true).length) {
    drag3d = { mode: 'handle', pointerId: evt.pointerId, id: rotHandleInfo.id, planeY: rotHandleInfo.y, moved: false };
    controls.enabled = false;
    return true;
  }
  // 2) 人偶（開啟時可拖曳，拖曳平面取地面 y=0）
  if (state.scene.figureOn && raycaster.intersectObject(figureGroup, true).length) {
    const hit = rayHitPlaneY(0);
    if (hit) {
      const fp = figurePos();
      drag3d = {
        mode: 'figure', pointerId: evt.pointerId,
        dx: fp.x - (hit.x + w / 2), dy: fp.y - (hit.z + d / 2), moved: false,
      };
      controls.enabled = false;
    }
    return true;
  }
  // 3) 一般物件：選取＋開始拖曳
  let placedId = null;
  for (const hit of raycaster.intersectObjects(itemGroup.children, true)) {
    placedId = findPlacedId(hit.object);
    if (placedId != null) break;
  }
  if (placedId != null) {
    // 開始拖曳時把該物件移到陣列尾端（提升堆疊優先序，疊在其他物件上方），同原本 2D 版行為
    const idx = state.placed.findIndex(q => q.id === placedId);
    if (idx !== -1 && idx !== state.placed.length - 1) {
      const [item] = state.placed.splice(idx, 1);
      state.placed.push(item);
      saveState();
    }
    select(placedId);
    const p = state.placed.find(q => q.id === placedId);
    // 拖曳平面取「該物件底面高度」的水平面，滑鼠在平面上的位移即為物件位移
    const elev = computeElevations();
    const planeY = h + clothOffsetY() + (elev.get(placedId) || 0);
    const hit = rayHitPlaneY(planeY);
    if (hit) {
      drag3d = {
        mode: 'item', pointerId: evt.pointerId, id: placedId, planeY,
        dx: p.cx - (hit.x + w / 2), dy: p.cy - (hit.z + d / 2), moved: false,
      };
      controls.enabled = false;
    }
    return true;
  }
  // 4) 空白處：滑鼠＝取消選取（絕不旋轉視角）；觸控＝不處理，交給 OrbitControls 旋轉視角
  if (!isTouch) select(null);
  return false;
}

renderer.domElement.addEventListener('pointerdown', (evt) => {
  if (evt.pointerType === 'touch') {
    if (drag3d) return; // 已有拖曳中的手指，忽略新落下的手指（交給 OrbitControls 處理雙指手勢）
    const hit = beginPrimary(evt);
    blankTouchStart = hit ? null : { pointerId: evt.pointerId, x: evt.clientX, y: evt.clientY, moved: false };
    return;
  }
  // 滑鼠／觸控筆：已有進行中的拖曳時，忽略後按下的其他鍵（只認先開始的拖曳）
  if (drag3d) return;
  if (evt.button === 0) {
    beginPrimary(evt);
  }
  // 中鍵平移／右鍵旋轉視角交給 OrbitControls 處理
});

renderer.domElement.addEventListener('pointermove', (evt) => {
  // 物件互動（拖曳移動／旋轉把手／人偶）
  if (drag3d && drag3d.pointerId === evt.pointerId) {
    const { w, d } = state.table;
    setRayFromEvent(evt);
    if (drag3d.mode === 'item') {
      const p = state.placed.find(q => q.id === drag3d.id);
      const hit = rayHitPlaneY(drag3d.planeY);
      if (p && hit) {
        // 平面交點換算回桌面座標（原點在桌面左上角），1cm 吸附
        p.cx = Math.round(hit.x + w / 2 + drag3d.dx);
        p.cy = Math.round(hit.z + d / 2 + drag3d.dy);
        drag3d.moved = true;
        update();
      }
    } else if (drag3d.mode === 'handle') {
      const p = state.placed.find(q => q.id === drag3d.id);
      const hit = rayHitPlaneY(drag3d.planeY);
      if (p && hit) {
        const dx = hit.x - (p.cx - w / 2);
        const dz = hit.z - (p.cy - d / 2);
        // 與 2D 版 atan2(dx, -dy) 同推導：把手在 rot=0 時指向局部 -z（即 2D 的 -y），
        // 把手世界方位 (dx, dz) = (L·sinθ, -L·cosθ)，反解 θ = atan2(dx, -dz)
        let angle = Math.atan2(dx, -dz) * 180 / Math.PI;
        const snapDeg = evt.shiftKey ? 1 : 15;
        angle = Math.round(angle / snapDeg) * snapDeg;
        p.rot = ((angle % 360) + 360) % 360;
        drag3d.moved = true;
        update();
      }
    } else if (drag3d.mode === 'figure') {
      const hit = rayHitPlaneY(0);
      if (hit) {
        state.scene.figureX = Math.round(hit.x + w / 2 + drag3d.dx);
        state.scene.figureY = Math.round(hit.z + d / 2 + drag3d.dy);
        drag3d.moved = true;
        update();
      }
    }
    return;
  }
  // 觸控在空白處按下後移動：交給 OrbitControls 旋轉視角，這裡只記錄「有移動」供放開時判斷
  if (blankTouchStart && blankTouchStart.pointerId === evt.pointerId) {
    const dx = evt.clientX - blankTouchStart.x, dy = evt.clientY - blankTouchStart.y;
    if (Math.abs(dx) + Math.abs(dy) > 4) blankTouchStart.moved = true;
  }
});

function releasePointer(evt) {
  if (drag3d && drag3d.pointerId === evt.pointerId) {
    if (drag3d.moved) saveState(); // 有實際移動／旋轉才存檔
    drag3d = null;
    controls.enabled = true;
  }
  if (blankTouchStart && blankTouchStart.pointerId === evt.pointerId) {
    // 觸控在空白處點一下（沒有拖動）＝取消選取；有拖動則是 OrbitControls 在轉視角，不處理
    if (!blankTouchStart.moved) select(null);
    blankTouchStart = null;
  }
}
renderer.domElement.addEventListener('pointerup', releasePointer);
renderer.domElement.addEventListener('pointercancel', releasePointer);
// 右鍵用於旋轉視角，攔掉瀏覽器右鍵選單
renderer.domElement.addEventListener('contextmenu', (evt) => evt.preventDefault());

function resize3d() {
  const rect = wrap.getBoundingClientRect();
  if (rect.width === 0 || rect.height === 0) return;
  renderer.setSize(rect.width, rect.height);
  camera.aspect = rect.width / rect.height;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize3d).observe(wrap);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ================= 版面分隔條（側欄寬度可拖拉調整） ================= */
const UI_KEY = 'market-display-ui';
const sidebarEl = document.getElementById('sidebar');
const splitA = document.getElementById('splitA');

function clampNum(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

function saveUiLayout() {
  const ui = {
    sidebarW: Math.round(sidebarEl.getBoundingClientRect().width),
  };
  try { localStorage.setItem(UI_KEY, JSON.stringify(ui)); } catch (e) { /* 略過寫入失敗 */ }
}

function loadUiLayout() {
  let ui = null;
  try {
    const raw = localStorage.getItem(UI_KEY);
    if (raw) ui = JSON.parse(raw);
  } catch (e) { /* 壞資料直接忽略，維持預設版面 */ }
  if (!ui) return;
  if (Number.isFinite(ui.sidebarW)) {
    sidebarEl.style.width = clampNum(ui.sidebarW, 180, 500) + 'px';
  }
}

let uiDrag = false; // 側欄分隔條拖曳中
splitA.addEventListener('pointerdown', (evt) => {
  uiDrag = true;
  splitA.classList.add('dragging');
  document.body.style.userSelect = 'none';
  splitA.setPointerCapture(evt.pointerId);
  evt.preventDefault();
});
splitA.addEventListener('pointermove', (evt) => {
  if (!uiDrag) return;
  evt.preventDefault();
  sidebarEl.style.width = clampNum(evt.clientX, 180, 500) + 'px';
});
splitA.addEventListener('pointerup', () => {
  if (!uiDrag) return;
  uiDrag = false;
  splitA.classList.remove('dragging');
  document.body.style.userSelect = '';
  saveUiLayout();
});

/* ================= 手機版 UI（側欄抽屜） ================= */
const menuBtn = document.getElementById('menuBtn');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const mobileMq = window.matchMedia('(max-width: 768px)');

function openDrawer() {
  sidebarEl.classList.add('open');
  drawerBackdrop.style.display = 'block';
}
function closeDrawer() {
  sidebarEl.classList.remove('open');
  drawerBackdrop.style.display = 'none';
}
menuBtn.addEventListener('click', () => {
  sidebarEl.classList.contains('open') ? closeDrawer() : openDrawer();
});
drawerBackdrop.addEventListener('click', closeDrawer);

/* 手機模式：桌面版拖拉分隔條留下的 inline 寬度會蓋掉手機版抽屜寬度，進入手機模式時清掉；
   回到桌面模式時，把 inline 寬度依 localStorage 存的版面設定還原 */
function enterMobileMode() {
  closeDrawer();
  sidebarEl.style.width = '';
}
function exitMobileMode() {
  closeDrawer();
  loadUiLayout();
  resize3d();
}
mobileMq.addEventListener('change', (evt) => {
  if (evt.matches) enterMobileMode(); else exitMobileMode();
});

/* ================= main update ================= */
function update() {
  const elevations = computeElevations(); // 每次 update 只算一次，3D / 統計 / 旋轉把手共用
  renderStats(elevations);
  build3dTable();
  build3dItems(elevations);
  buildFigure();
  buildRotHandle(elevations);
  buildDimIndicator(elevations);
  syncDimCard();
}

renderSidebar();
applySceneColors();
rebuild3dCamera();
loadUiLayout();
if (mobileMq.matches) enterMobileMode();
resize3d();
update();
</script>
